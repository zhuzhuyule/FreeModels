name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          sparse-checkout: |
            index.html
            website
            data

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site
        run |
          mkdir -p ./_site
          cp index.html ./_site/ || true
          cp -r website ./_site/ || true
          cp -r data ./_site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
