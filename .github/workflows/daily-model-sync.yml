name: Daily Model Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Sync models and docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WECHAT_QYAPI_ID: ${{ secrets.WECHAT_QYAPI_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run sync

      - name: Open PR with changes
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: sync models and generated docs'
          title: 'chore: daily model sync'
          body: |
            Automated daily sync from upstream providers.

            Review the diff for unexpected model removals or anomaly warnings before merging.
          branch: bot/daily-model-sync
          base: master
          delete-branch: true
          add-paths: |
            data
            README.md
            docs/providers
