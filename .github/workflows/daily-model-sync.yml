name: Daily Model Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync models and docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WECHAT_QYAPI_ID: ${{ secrets.WECHAT_QYAPI_ID }}
        run: npm run sync

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync models and generated docs'
          file_pattern: 'data/**/*.json README.md docs/providers/**/*.md'
