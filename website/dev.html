<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Hub - Dev</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--border:#e2e8f0;
    --text:#0f172a;--text2:#64748b;--accent:#3b82f6;--accent2:#2563eb;
    --green:#22c55e;--orange:#f59e0b;--red:#ef4444;
  }
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
  a{color:var(--accent);text-decoration:none}

  .header{background:white;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px}
  .header h1{font-size:18px;font-weight:700}
  .header .badge{background:var(--accent);color:white;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600}
  .header .count{color:var(--text2);font-size:14px}

  .filter-bar{padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .search{position:relative;flex:1;min-width:240px}
  .search input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .search::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.5}
  select{ padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;cursor:pointer;min-width:120px}
  select:focus{border-color:var(--accent)}

  .table-wrap{padding:0 24px 24px;overflow-x:auto}
  table{width:100%;border-collapse:separate;border-spacing:0;background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden}
  thead{background:var(--surface2)}
  th{padding:12px 16px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--accent)}
  th.sorted{color:var(--accent)}
  th .sort{margin-left:4px;opacity:.4;font-size:9px}
  th.sorted .sort{opacity:1}
  td{padding:10px 16px;font-size:13px;border-top:1px solid var(--border);white-space:nowrap}
  tbody tr:hover{background:var(--surface2)}

  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
  .badge-free{background:#dcfce7;color:#166534}
  .badge-trial{background:#fef3c7;color:#92400e}
  .badge-none{background:#fee2e2;color:#991b1b}
  .badge-pay{background:#fee2e2;color:#991b1b}
  .badge-small{background:#e0e7ff;color:#3730a3}
  .badge-medium{background:#fef3c7;color:#92400e}
  .badge-large{background:#fce7f3;color:#9d174d}
  .badge-fast{background:#dcfce7;color:#166534}
  .badge-standard{background:#e0e7ff;color:#3730a3}
  .badge-premium{background:#fef3c7;color:#92400e}

  .empty{text-align:center;padding:60px 20px;color:var(--text2)}
  .loading{text-align:center;padding:60px 20px;color:var(--text2)}
  .hint{font-size:13px;color:var(--text2);margin-left:8px}
</style>
</head>
<body>

<div class="header">
  <h1>Model Hub</h1>
  <span class="badge" id="viewBadge">all</span>
  <span class="count" id="totalCount"></span>
  <span class="hint" id="viewHint"></span>
</div>

<div class="filter-bar">
  <div class="search">
    <input type="text" id="searchInput" placeholder="搜索模型名称、描述...">
  </div>
  <select id="providerFilter">
    <option value="">所有厂商</option>
  </select>
  <select id="tierFilter">
    <option value="">所有规模</option>
    <option value="small">Small</option>
    <option value="medium">Medium</option>
    <option value="large">Large</option>
  </select>
  <select id="speedFilter">
    <option value="">所有速度</option>
    <option value="fast">Fast</option>
    <option value="standard">Standard</option>
    <option value="premium">Premium</option>
  </select>
  <select id="freeFilter">
    <option value="">所有计费</option>
    <option value="true">免费</option>
    <option value="paid-trial">付费可试用</option>
    <option value="false">付费</option>
  </select>
  <select id="mechanismFilter">
    <option value="">所有免费机制</option>
    <option value="permanent">永久免费</option>
    <option value="rate-limited">限速免费</option>
    <option value="daily-tokens">每日配额</option>
    <option value="monthly-tokens">每月配额</option>
    <option value="trial-credits">试用 credits</option>
    <option value="preview">预览版</option>
  </select>
  <select id="typeFilter">
    <option value="">所有类别</option>
  </select>
  <select id="reasoningFilter">
    <option value="">所有类型</option>
    <option value="true">推理模型</option>
  </select>
  <select id="toolUseFilter">
    <option value="">工具调用</option>
    <option value="true">支持</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-key="idx" class="sorted"># <span class="sort">▲</span></th>
        <th data-key="name">模型 <span class="sort">▲</span></th>
        <th data-key="provider">厂商 <span class="sort">▲</span></th>
        <th data-key="context_label">上下文 <span class="sort">▲</span></th>
        <th data-key="modelType">模型类别 <span class="sort">▲</span></th>
        <th data-key="tier">规模 <span class="sort">▲</span></th>
        <th data-key="speed">速度 <span class="sort">▲</span></th>
        <th data-key="is_free">免费 <span class="sort">▲</span></th>
        <th data-key="free_mechanism">免费机制 <span class="sort">▲</span></th>
        <th>能力标签</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="10" class="loading">加载中...</td></tr>
    </tbody>
  </table>
</div>

<script>
let allModels = [];
let filteredModels = [];
let sortKey = 'idx';
let sortAsc = true;

async function loadJSON(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    return await res.json();
  } catch (e) {
    console.error('Failed to load', url, e);
    return null;
  }
}

async function loadData() {
  const params = new URLSearchParams(window.location.search);
  const currentView = params.get('view') || 'all';

  const viewNames = {
    'all': '全部',
    'free': '全部免费',
    'free-permanent': '永久免费',
    'free-rate-limited': '限速免费',
    'free-quota': '配额免费',
    'paid-trial': '付费可试用',
    'reasoning': '推理模型',
    'multimodal': '多模态',
    'tool-use': '工具调用',
    'fast': '快速',
    'premium': '高级',
    'small': '小型',
    'large': '大型'
  };
  const viewHints = {
    'all': '所有模型',
    'free': '在某种条件下不付费可用（is_free=true）',
    'free-permanent': '无任何限制，永久免费',
    'free-rate-limited': '有 RPM/RPD 限制但免费',
    'free-quota': '每日 / 每月 token 配额或一次性 credits',
    'paid-trial': '付费模型，但可通过试用入口调用（如 Gitee 体验）',
    'reasoning': '支持推理能力',
    'multimodal': '支持多模态',
    'tool-use': '支持工具调用',
    'fast': '快速响应',
    'premium': '高性能',
    'small': '小型模型',
    'large': '大型模型'
  };

  document.getElementById('viewBadge').textContent = viewNames[currentView] || currentView;
  document.getElementById('viewHint').textContent = viewHints[currentView] || '';

  const data = await loadJSON('../data/models.json');

  if (!data || !data.data) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="10" class="empty">加载失败，请确保先运行 npm run sync-models</td></tr>';
    return;
  }

  let models = data.data;
  if (currentView === 'free') {
    models = models.filter(m => m.is_free);
  } else if (currentView === 'free-full') {
    models = models.filter(m => m.is_free);
  } else if (currentView === 'experienceable') {
    models = models.filter(m => m.is_experienceable);
  } else if (currentView === 'reasoning') {
    models = models.filter(m => m.is_reasoning);
  } else if (currentView === 'multimodal') {
    models = models.filter(m => m.is_multimodal);
  } else if (currentView === 'tool-use') {
    models = models.filter(m => m.has_tool_use);
  } else if (currentView === 'fast') {
    models = models.filter(m => m.speed === 'fast');
  } else if (currentView === 'premium') {
    models = models.filter(m => m.speed === 'premium');
  } else if (currentView === 'small') {
    models = models.filter(m => m.tier === 'small');
  } else if (currentView === 'large') {
    models = models.filter(m => m.tier === 'large');
  }

  allModels = models.map((m, i) => ({ ...m, idx: i + 1 }));
  document.getElementById('totalCount').textContent = `共 ${allModels.length} 个模型`;

  populateFilters();
  applyFilters();
}

function populateFilters() {
  const providers = [...new Set(allModels.map(m => m.provider))].sort();
  const sel = document.getElementById('providerFilter');
  sel.innerHTML = '<option value="">所有厂商</option>' +
    providers.map(p => `<option value="${p}">${p}</option>`).join('');

  const typeMap = {
    'text-generation': '文本生成',
    'chat': '对话',
    'image-generation': '图片生成',
    'embeddings': '向量表示',
    'vision': '视觉理解',
    'speech-recognition': '语音识别',
    'speech-synthesis': '语音合成',
    'video-generation': '视频生成',
    'moderation': '内容审核',
    'rerank': '重排序',
    'code-generation': '代码生成'
  };
  const types = [...new Set(allModels.flatMap(m => m.capabilities || []))].sort();
  const typeSel = document.getElementById('typeFilter');
  typeSel.innerHTML = '<option value="">所有类别</option>' +
    types.map(t => `<option value="${t}">${typeMap[t] || t}</option>`).join('');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const provider = document.getElementById('providerFilter').value;
  const tier = document.getElementById('tierFilter').value;
  const speed = document.getElementById('speedFilter').value;
  const isFree = document.getElementById('freeFilter').value;
  const mechanism = document.getElementById('mechanismFilter').value;
  const modelType = document.getElementById('typeFilter').value;
  const reasoning = document.getElementById('reasoningFilter').value;
  const toolUse = document.getElementById('toolUseFilter').value;

  filteredModels = allModels.filter(m => {
    if (q && !m.name?.toLowerCase().includes(q) &&
        !m.description?.toLowerCase().includes(q) &&
        !m.model_id?.toLowerCase().includes(q)) return false;
    if (provider && m.provider !== provider) return false;
    if (tier && m.tier !== tier) return false;
    if (speed && m.speed !== speed) return false;
    if (isFree === 'true' && !m.is_free) return false;
    if (isFree === 'false' && (m.is_free || m.trial_scope === 'all')) return false;
    if (isFree === 'paid-trial' && (m.is_free || m.trial_scope !== 'all')) return false;
    if (mechanism && m.free_mechanism !== mechanism) return false;
    if (modelType && !(m.capabilities || []).includes(modelType)) return false;
    if (reasoning && String(m.is_reasoning) !== reasoning) return false;
    if (toolUse && String(m.has_tool_use) !== toolUse) return false;
    return true;
  });

  sortModels();
  renderTable();

  const hasFilters = document.getElementById('searchInput').value ||
                    document.getElementById('providerFilter').value ||
                    document.getElementById('tierFilter').value ||
                    document.getElementById('speedFilter').value ||
                    document.getElementById('freeFilter').value ||
                    document.getElementById('mechanismFilter').value ||
                    document.getElementById('reasoningFilter').value ||
                    document.getElementById('toolUseFilter').value;

  if (hasFilters) {
    document.getElementById('totalCount').textContent = `显示 ${filteredModels.length} / 共 ${allModels.length} 个`;
  }
}

function sortModels() {
  filteredModels.sort((a, b) => {
    let va = a[sortKey] ?? '';
    let vb = b[sortKey] ?? '';
    if (typeof va === 'number') return sortAsc ? va - vb : vb - va;
    va = String(va).toLowerCase();
    vb = String(vb).toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (filteredModels.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">未找到匹配的模型</td></tr>';
    return;
  }

  const typeMap = {
    'text-generation': '文本生成',
    'chat': '对话',
    'image-generation': '图片生成',
    'embeddings': '向量',
    'vision': '视觉',
    'speech-recognition': '语音识别',
    'speech-synthesis': '语音合成',
    'video-generation': '视频生成',
    'moderation': '审核',
    'rerank': '重排序',
    'code-generation': '代码',
    'image-to-image': '图生图',
    'document-processing': '文档处理'
  };

  const mechanismLabel = {
    'permanent': '永久',
    'rate-limited': '限速',
    'daily-tokens': '日配额',
    'monthly-tokens': '月配额',
    'trial-credits': '试用',
    'preview': '预览',
  };

  tbody.innerHTML = filteredModels.map(m => {
    const tierClass = `badge-${m.tier || 'medium'}`;
    const speedClass = `badge-${m.speed || 'standard'}`;
    const freeLabel = m.is_free ? '免费' : '付费';
    const freeClass = m.is_free ? 'badge-free' : 'badge-pay';
    const mechClass = m.free_mechanism ? `badge-${m.free_mechanism}` : 'badge-none';
    const mechLabel = m.free_mechanism ? (mechanismLabel[m.free_mechanism] || m.free_mechanism) : '—';
    const caps = (m.tags || []).slice(0, 4).map(c => `<span class="tag">${esc(c)}</span>`).join('');
    const primaryType = m.capabilities?.[0] || 'unknown';
    const typeLabel = typeMap[primaryType] || primaryType;
    const quotaTip = m.free_quota?.notes ? ` title="${esc(m.free_quota.notes)}"` : '';
    return `<tr>
      <td style="color:var(--text2);font-weight:600">${m.idx}</td>
      <td><div style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis">${esc(m.name)}</div>
          <div style="font-size:11px;color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis">${esc(m.description || '')}</div></td>
      <td>${esc(m.provider)}</td>
      <td>${m.context_label || '-'}</td>
      <td><span style="font-size:12px;color:var(--accent)">${typeLabel}</span></td>
      <td><span class="badge ${tierClass}">${m.tier || '-'}</span></td>
      <td><span class="badge ${speedClass}">${m.speed || '-'}</span></td>
      <td><span class="badge ${freeClass}">${freeLabel}</span></td>
      <td><span class="badge ${mechClass}"${quotaTip}>${mechLabel}</span></td>
      <td>${caps}</td>
    </tr>`;
  }).join('');
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

document.querySelectorAll('th[data-key]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (sortKey === key) { sortAsc = !sortAsc; }
    else { sortKey = key; sortAsc = true; }
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort').textContent = sortAsc ? '▲' : '▼';
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', applyFilters);
['providerFilter', 'tierFilter', 'speedFilter', 'freeFilter', 'mechanismFilter', 'typeFilter', 'reasoningFilter', 'toolUseFilter'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

loadData();
</script>
</body>
</html>
